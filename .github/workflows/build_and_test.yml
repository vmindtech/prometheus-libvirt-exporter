name: Build, Test and Release Binaries
on: push
permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.x

      - name: Run Tests
        run: go test ./...

  release:
    needs: build
    steps:
      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker build and push
        run: |
          docker build -t vmindtech/prometheus-libvirt-exporter:${GITHUB_REF##*/} .
          docker push vmindtech/prometheus-libvirt-exporter:${GITHUB_REF##*/}  
